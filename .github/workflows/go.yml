# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
name: Go

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libopus-dev libvpx-dev pkg-config

    - name: Install ntgcalls
      run: |
        git clone https://github.com/iyear/ntgcalls.git
        cd ntgcalls
        mkdir build && cd build
        cmake .. && make && sudo make install
        cd ../..

    - name: Build
      run: go build -v ./...

    - name: Run Bot
      run: go run main.go
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        TOKEN: ${{ secrets.TOKEN }}
        STRING1: ${{ secrets.STRING1 }}
